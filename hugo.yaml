# Hugo configuration file
baseURL: "http://localhost:1313/"
languageCode: "da-dk"
title: "Asger Høffner"

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false

menu:
  main:
    - name: Om mig
      pageRef: /about
      weight: 1

    - name: Projekter
      pageRef: /projects
      weight: 2

    - name: AIDA-Portfolio
      pageRef: /uger
      weight: 3

    - name: GitHub ↗
      url: "https://github.com/asgersh"
      weight: 5
      params:
        icon: github

    - name: Search
      weight: 6
      params:
        type: search

    - name: Theme
      weight: 7
      params:
        type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  theme:
    default: system
    displayToggle: false

  editURL:
    enable: false